name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Read version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Package extension
        run: |
          cp -r dist tmap-hooker-chrome
          zip -r tmap-hooker-chrome-v${{ env.VERSION }}.zip tmap-hooker-chrome

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: tmap-hooker-chrome-v${{ env.VERSION }}.zip
          make_latest: true
          overwrite: true
